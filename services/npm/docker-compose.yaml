services:
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: npm
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data/npm_data:/data
      - ./data/npm_letsencrypt:/etc/letsencrypt
      - ./data/npm_logs:/var/log/nginx
    networks:
      - homelab_network
    environment:
      - DB_SQLITE_FILE="/data/database.sqlite"
      - INITIAL_ADMIN_EMAIL=admin@admin.com
      - INITIAL_ADMIN_PASSWORD=admin123

networks:
  homelab_network:
    external: true